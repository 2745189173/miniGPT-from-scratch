[tool.ruff]
target-version = "py310"
line-length = 88
extend-exclude = ["artifacts"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"experiments/*.py" = ["E402"]
"scripts/*.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
