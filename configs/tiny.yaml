seed: 1337

experiment:
  run_name: e002_shakespeare_baseline

data:
  input_path: data/raw/input.txt

model:
  block_size: 16
  n_layer: 2
  n_head: 4
  n_embd: 64
  dropout: 0.1

train:
  batch_size: 32
  max_iters: 500
  eval_interval: 100
  eval_iters: 20
  learning_rate: 0.0003
  weight_decay: 0.1
  device: cuda

generate:
  prompt: "the"
  max_new_tokens: 300
  temperature: 0.8
  top_k: 40
